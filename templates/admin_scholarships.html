<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Scholarships</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
    .page { padding: 30px; }
    
    /* The Line Across the Screen */
    .tabs { 
        display: flex; 
        gap: 0; 
        border-bottom: 2px solid #ddd; /* The horizontal line */
        margin-bottom: 30px;
    }

    /* Tab Buttons as Flat Links */
    .tab-btn { 
        background: transparent; 
        color: #666; 
        border: none;
        border-bottom: 3px solid transparent; /* Hidden border for alignment */
        padding: 12px 24px; 
        cursor: pointer; 
        font-weight: bold;
        font-size: 16px;
        transition: all 0.3s ease;
    }

    /* The Active Tab - Light Shading & Highlight Line */
    .tab-btn.active { 
        background: #f1f8e9; /* Light green shading */
        color: #1b5e20; 
        border-bottom: 3px solid #1b5e20; /* Highlighted line segment */
    }

    .tab-btn:hover {
        background: #f9f9f9;
    }

    /* Card styling */
    .card { 
        background:#fff; 
        border-radius:14px; 
        box-shadow:0 6px 16px rgba(0,0,0,0.08); 
        padding:20px; 
        display: none; 
    }
    .card.active { display: block; }

        .card h2 { margin-top:0; color:#1b5e20; }
        label { font-weight:bold; color:#1b5e20; }
        input, textarea, select { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; margin-bottom:12px; }
        button { background:#1b5e20; color:white; border:none; padding:12px 16px; border-radius:8px; cursor:pointer; }
        table { width:100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding:12px; border:1px solid #ddd; text-align:left; }
        th { background:#e8f5e9; color:#1b5e20; }
        .edit-link { color: #1b5e20; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body class="dashboard-page">
    <div class="topbar">
        <h1>Manage Scholarships</h1>
        <a href="{{ url_for('admin_dashboard') }}">Back to Dashboard</a>
    </div>

    <div class="page">
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'view-tab')">Existing Scholarships</button>
            <button class="tab-btn" onclick="openTab(event, 'create-tab')">Create New</button>
        </div>

        <div id="view-tab" class="card active" style="overflow:auto;">
            <h2>Existing Scholarships</h2>
            {% if scholarships %}
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Deadline</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in scholarships %}
                    <tr>
                        <td>{{ s.id }}</td>
                        <td>{{ s.title }}</td>
                        <td>{{ s.deadline }}</td>
                        <td>{{ s.status }}</td>
                        <td><a href="{{ url_for('edit_scholarship', id=s.id) }}" class="edit-link">Edit</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
                <p>No scholarships yet.</p>
            {% endif %}
        </div>

        <div id="create-tab" class="card">
            <h2>Create Scholarship</h2>
            <form method="post">
                <label>Title</label>
                <input type="text" name="title" placeholder="e.g. Merit-Based Bursary" required>
                <label>Department</label>
                <select name="department" required class="form-control">
                    <option value="" disabled selected>Select Department</option>
                    <option value="IT">Information Technology</option>
                    <option value="IS">Information Systems</option>
                    <option value="FIM">Finance and Information Management</option>
                    <option value="FA">Financial Accounting</option>
                    <option value="ICM">Information and Corporate Management</option>
                    <option value="MA">Management Accounting</option>
                    <option value="AT">Auditing and Taxation</option>
                </select>
                <label>Description</label>
                <textarea name="description" rows="3" required></textarea>

                <label>Requirements</label>
                <textarea name="requirements" rows="3" required></textarea>

                <label>Deadline (YYYY-MM-DD)</label>
                <input type="date" name="deadline" required> <label>Status</label>
                <select name="status">
                    <option value="Open">Open</option>
                    <option value="Closed">Closed</option>
                </select>

                <button type="submit">Create Scholarship</button>
            </form>
        </div>
    </div>

    <script>
        function openTab(evt, tabId) {
            // Hide all tab content
            var content = document.getElementsByClassName("card");
            for (var i = 0; i < content.length; i++) {
                content[i].classList.remove("active");
            }

            // Remove 'active' class from all buttons
            var buttons = document.getElementsByClassName("tab-btn");
            for (var i = 0; i < buttons.length; i++) {
                buttons[i].classList.remove("active");
            }

            // Show current tab and add 'active' class to clicked button
            document.getElementById(tabId).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
